services:
  # ========== Redis 7 ==========
  redis:
    image: redis:7-alpine
    container_name: resource-redis
    restart: always
    ports:
      - "6379:6379"

  # ========== MinIO ==========
  minio:
    image: minio/minio:latest
    container_name: resource-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  minio-data: